# Test INI for cmdrsk_vfd — uses a virtual serial port created by socat
#
# The test runner creates a PTY pair and symlinks one end to the DEVICE
# path below.  The other end is either left unconnected (Phase 1) or
# attached to a Modbus slave simulator (Phase 2).

[CMDRSK]
DEVICE=/tmp/cmdrsk_test_pty
BAUD=19200
BITS=8
PARITY=none
STOPBITS=2
SERIAL_MODE=rs485
TARGET=1
POLLCYCLES=10
RECONNECT_DELAY=1
RESPONSE_TIMEOUT=0.5
BYTE_TIMEOUT=0.5
DEBUG=1

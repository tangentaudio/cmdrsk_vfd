# cmdrsk.ini — Commander SK VFD configuration for cmdrsk_vfd
#
# This section is read by cmdrsk_vfd at startup.  The section name must
# match the -S argument (default: CMDRSK).
#
# Include this file from your machine's main LinuxCNC INI with:
#   [INCLUDE] cmdrsk.ini
# or copy the [CMDRSK] section into your machine INI file.

[CMDRSK]

# --- Serial port ---
# The RS-485 serial device.  Typically a USB-to-RS485 adapter.
DEVICE=/dev/ttyS0

# --- Serial parameters ---
# Commander SK default: 19200 8N2 (8 data bits, no parity, 2 stop bits).
# Verify against Pr 11.25 (baud) and Pr 11.24 (protocol) on the drive.
BAUD=19200
BITS=8
PARITY=none
STOPBITS=2

# --- RS-485 direction control ---
# SERIAL_MODE: rs232 or rs485
SERIAL_MODE=rs485

# RTS_MODE controls half-duplex direction switching via the RTS line.
# Values: none, up, down
#   none  — adapter handles direction automatically (e.g. FTDI FT232 in RS485 mode)
#   up    — assert RTS before transmitting (most half-duplex adapters)
#   down  — deassert RTS before transmitting
# Check your specific adapter's datasheet.
RTS_MODE=up

# --- Modbus timing ---
# Time to wait for first byte of response (seconds)
RESPONSE_TIMEOUT=0.5
# Time to wait between bytes within a response (seconds)
BYTE_TIMEOUT=0.5

# --- Modbus slave address ---
# Must match Pr 11.23 on the drive (default: 1).
TARGET=1

# --- Polling ---
# Number of fast poll cycles between reads of slow registers
# (motor RPM, % load, hardware-enable, drive-enable).
# At looptime=0.01s and POLLCYCLES=10, slow regs are read every 100ms.
POLLCYCLES=10

# --- Reconnect ---
# Seconds to wait between reconnect attempts after a serial link error.
RECONNECT_DELAY=1

# --- Debug ---
# Set to 1 for driver debug messages, 2+ for more verbose output.
# DEBUG=0
# Set to 1 to print raw Modbus frames to stderr (very verbose).
# MODBUS_DEBUG=0
